    <script>
      (function () {
        var search = window.location.search;
        if (!search || search.indexOf('?p=') !== 0) {
          return;
        }

        var path = search.slice(3);
        var queryIndex = path.indexOf('&q=');
        var route = queryIndex >= 0 ? path.slice(0, queryIndex) : path;
        var query = queryIndex >= 0 ? path.slice(queryIndex + 3) : '';
        var decodedPath = '/' + route.split('&').shift().split('/').map(function (part) {
          return decodeURIComponent(part);
        }).join('/');
        var decodedQuery = query ? ('?' + decodeURIComponent(query)) : '';
        window.history.replaceState(null, '', decodedPath + decodedQuery + window.location.hash);
      })();
    </script>
